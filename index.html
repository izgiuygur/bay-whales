<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0051BA" />

    <title>Bay Whale Strandings</title>
    <meta
      name="description"
      content="An interactive map of whale strandings across the San Francisco Bay Area"
    />

    <!-- Canonical URL. Always points at the bare home URL, independent
         of any query params a shared link may carry. -->
    <link rel="canonical" href="https://www.baywhales.org/" />

    <!-- Favicons. Multiple sizes so the browser can pick the
         sharpest one for each surface (tab, taskbar, bookmarks). -->
    <link rel="icon" type="image/png" sizes="32x32" href="/whale-icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/whale-icon-16.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/whale-icon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/whale-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph. Absolute URLs (FB/Slack/LinkedIn fetchers don't
         resolve relative paths). Width/height let Facebook skip the
         pre-flight image probe and render the unfurl immediately. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bay Whale Strandings" />
    <meta
      property="og:description"
      content="An interactive map of whale strandings across the San Francisco Bay Area"
    />
    <meta property="og:image" content="https://www.baywhales.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Bay Whale Strandings — interactive map of whale strandings in the San Francisco Bay Area, by Izgi Uygur"
    />
    <meta property="og:url" content="https://www.baywhales.org/" />
    <meta property="og:site_name" content="Bay Whale Strandings" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bay Whale Strandings" />
    <meta
      name="twitter:description"
      content="An interactive map of whale strandings across the San Francisco Bay Area"
    />
    <meta name="twitter:image" content="https://www.baywhales.org/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="Bay Whale Strandings — interactive map of whale strandings in the San Francisco Bay Area, by Izgi Uygur"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="preload" as="fetch" href="/water-area.json" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
