<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0051BA" />
    <title>Page not found · Bay Whale Strandings</title>
    <meta
      name="description"
      content="An interactive map of whale strandings across the San Francisco Bay Area"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      :root {
        --blue: #0051ba;
        --ink: #1a1a1a;
        --muted: #6b7280;
        --bg: #ffffff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family:
          "Helvetica Neue",
          Helvetica,
          Arial,
          system-ui,
          -apple-system,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        object-fit: contain;
        display: block;
        margin: 0 auto 20px;
      }
      .code {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--blue);
        margin-bottom: 8px;
      }
      h1 {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.02em;
        margin: 0 0 12px;
      }
      p {
        font-size: 15px;
        line-height: 1.55;
        color: var(--muted);
        max-width: 460px;
        margin: 0 0 24px;
      }
      a.btn {
        display: inline-block;
        padding: 10px 20px;
        background: var(--blue);
        color: #fff;
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-radius: 999px;
        transition: background 0.15s ease;
      }
      a.btn:hover {
        background: #003e8f;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="icon" src="/whale-icon.png" alt="Bay Whale Strandings" />
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>
        The page you&rsquo;re looking for doesn&rsquo;t exist or has moved.
        Head back to the map to keep exploring whale strandings across the
        San Francisco Bay Area.
      </p>
      <a class="btn" href="/">Back to the map</a>
    </div>
  </body>
</html>
